apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-dashboard-operator
  namespace: app-dashboard-operator
  labels:
    app: app-dashboard-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app-dashboard-operator
  template:
    metadata:
      labels:
        app: app-dashboard-operator
    spec:
      serviceAccountName: app-dashboard-operator
      containers:
        - name: manager
          image: default-route-openshift-image-registry.apps.sno.yamlwrangler.com/app-dashboard-operator/app-dashboard-operator:latest
          imagePullPolicy: Always
          command:
            - /manager
          args:
            - --leader-elect
          ports:
            - containerPort: 8080
              name: metrics
              protocol: TCP
            - containerPort: 8081
              name: health
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
      securityContext:
        runAsNonRoot: true

